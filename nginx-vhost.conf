server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # X-XSS-Protection is deprecated and harmful in some older browsers;
    # setting it to 0 disables the broken browser filter and relies on CSP.
    add_header X-XSS-Protection "0" always;

    # Tell browsers to always use HTTPS for future requests (1 year).
    # Only effective when served behind a TLS terminator.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Restrict browser feature access
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # Content Security Policy:
    #   script-src  — 'self' only, no unsafe-inline; Vite output is always
    #                 external JS files so no inline scripts are needed.
    #   style-src   — 'unsafe-inline' kept because Tailwind/Radix inject inline
    #                 styles at runtime (safe for CSS, not for JS).
    #   connect-src — https: only; http: removed to prevent token transmission
    #                 over unencrypted connections.
    #   img-src     — data: and blob: for avatars / object URLs; https: for
    #                 remote GitLab instance images.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https:; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    gzip_vary on;

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny hidden files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
